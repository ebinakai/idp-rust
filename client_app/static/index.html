<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ebina Kai">
    <meta name="description" content="IDP()">
    <title>IDP</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>IDP</h1>
        </header>
        <main>
            <section id="login-section">
                <h2>Login</h2>
                <form action="" id="login-form">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" required>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                    <button id="login-button" type="submit">Login</button>
                </form>
                <p id="error-message" class="error"></p>
            </section>

            <section id="result-section">
                <h2>Login Successful</h2>
                <p>IdPから取得したJWT（アクセストークン）:</p>
                <textarea id="token-display" readonly rows="5"></textarea>
                
                <button id="get-userinfo-button" type="button">ユーザー情報を取得</button>
                <pre id="userinfo-display"></pre>
                
                <button id="verify-local-button" type="button">クライアント側でローカル検証を実行</button>
                <pre id="verify-local-result"></pre>
                
                <button id="logout-button" type="submit">Logout</button>
            </section>    
        </main>
        <footer>
            <p>&copy; 2026 Ebina Kai. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
